<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог плодовых деревьев</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        body { background: #FAF9F5; font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #B48B5C;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1C352D;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div x-data="catalogApp()" x-init="init()" @keydown.escape="closeModal(); comparisonOpen = false; isFullScreen = false">
    
    <!-- ШАПКА -->
    <header class="border-b py-6 px-4 bg-white/50 backdrop-blur-md sticky top-0 z-30">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div>
                <span class="text-xs uppercase tracking-widest text-[#B48B5C]">Плодовый питомник</span>
                <h1 class="font-serif text-3xl text-[#1C352D]">
                    Саженцы плодовых деревьев
                    <span x-show="selectionList.length" class="text-sm font-sans text-[#B48B5C] ml-2 bg-[#FAF9F5] px-3 py-1 rounded-full">
                        выбрано <span x-text="selectionList.length"></span>
                    </span>
                </h1>
            </div>
            <div class="text-xs text-[#5B7065] max-w-xs text-right">
                Выберите саженцы и отправьте список в чат Авито
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-4 py-8">

        <!-- ЗАГРУЗКА -->
        <div x-show="loading" class="text-center py-20">
            <div class="spinner"></div>
            <p class="text-[#5B7065]">Загрузка каталога...</p>
        </div>

        <!-- ОШИБКА -->
        <div x-show="error" class="text-center py-20 text-red-600">
            <p class="text-lg font-bold">⚠️ Ошибка загрузки</p>
            <p class="text-sm" x-text="errorMessage"></p>
        </div>

        <!-- ФИЛЬТРЫ -->
        <div x-show="!loading && !error" class="bg-white rounded-3xl p-6 shadow-sm mb-8">
            <div class="flex flex-wrap gap-4 items-center justify-between">
                <div class="flex flex-wrap gap-2">
                    <template x-for="group in groups" :key="group">
                        <button @click="activeGroup = group"
                                :class="activeGroup === group ? 'bg-[#1C352D] text-white' : 'bg-[#FAF9F5] hover:bg-gray-200'"
                                class="px-4 py-2 rounded-full text-sm font-medium transition"
                                x-text="group === 'all' ? 'Все' : group"></button>
                    </template>
                </div>
                <div class="flex flex-wrap gap-3 items-center">
                    <input type="text" x-model.debounce="searchQuery" placeholder="Поиск..." class="w-48 bg-[#FAF9F5] rounded-full px-4 py-2 text-sm border focus:outline-none focus:border-[#B48B5C]">
                    <select x-model="sortBy" class="bg-[#FAF9F5] rounded-full px-4 py-2 text-sm border focus:outline-none focus:border-[#B48B5C]">
                        <option value="group">По группам</option>
                        <option value="price-asc">Цена ↑</option>
                        <option value="price-desc">Цена ↓</option>
                        <option value="name-asc">Название А–Я</option>
                        <option value="stock">Сначала в наличии</option>
                    </select>
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" x-model="onlyInStock" class="w-4 h-4">
                        В наличии
                    </label>
                </div>
            </div>
        </div>

        <!-- КАРТОЧКИ -->
        <div x-show="!loading && !error" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <template x-for="plant in sortedPlants" :key="plant.id">
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden hover:shadow-xl transition">
                    <div class="relative aspect-[4/3] bg-[#FAF9F5] cursor-pointer" @click="openModal(plant)">
                        <img :src="plant.media[0]" loading="lazy" class="w-full h-full object-contain">
                        <div class="absolute top-3 left-3 bg-white/95 px-3 py-1 rounded-full text-[10px] uppercase font-semibold text-[#B48B5C]" x-text="plant.group"></div>
                        <div class="absolute top-3 right-3">
                            <span :class="plant.stock > 0 ? 'bg-emerald-500' : 'bg-rose-500'" class="text-white px-3 py-1 rounded-full text-[10px] uppercase font-bold" x-text="plant.stock > 0 ? 'В наличии' : 'Нет'"></span>
                        </div>
                    </div>
                    <div class="p-5">
                        <h3 class="font-serif text-xl font-bold text-[#1C352D] cursor-pointer" @click="openModal(plant)" x-text="plant.title"></h3>
                        <div class="mt-3 flex items-center justify-between">
                            <span class="text-2xl font-bold text-[#1C352D]" x-text="plant.price + ' ₽'"></span>
                            <div class="flex gap-2">
                                <button @click="toggleComparison(plant)" :class="isInComparison(plant) ? 'bg-[#B48B5C] text-white' : 'bg-[#FAF9F5]'" class="px-3 py-2 rounded-xl text-sm transition">⚖️</button>
                                <button @click="toggleSelection(plant)" :class="isSelected(plant) ? 'bg-[#1C352D] text-white' : 'border-2 border-[#1C352D] text-[#1C352D]'" class="px-4 py-2 rounded-xl text-sm font-semibold transition" x-text="isSelected(plant) ? 'В корзине' : 'Выбрать'"></button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="sortedPlants.length === 0" class="col-span-full text-center py-16 text-[#5B7065]">
                <p class="text-xl">Ничего не найдено</p>
            </div>
        </div>

        <!-- МОДАЛКА -->
        <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 overflow-y-auto" @click.away="closeModal()">
            <div class="flex items-center justify-center min-h-screen px-4 py-6">
                <div class="fixed inset-0 bg-black/70" @click="closeModal()"></div>
                <div class="bg-white rounded-3xl max-w-4xl w-full relative z-10 overflow-hidden shadow-2xl">
                    <button @click="closeModal()" class="absolute top-4 right-4 bg-white/90 hover:bg-gray-100 p-2 rounded-full z-20 text-xl font-bold">✕</button>
                    <div class="flex flex-col md:flex-row">
                        <div class="md:w-1/2 bg-[#FAF9F5] p-6">
                            <div class="aspect-square bg-white rounded-2xl overflow-hidden cursor-pointer" @click="openFullScreen()">
                                <template x-for="(photo, idx) in currentPlant.media" :key="idx">
                                    <img :src="photo" x-show="activePhotoIndex === idx" class="w-full h-full object-contain">
                                </template>
                            </div>
                            <div class="flex gap-2 mt-4 overflow-x-auto hide-scrollbar" x-show="currentPlant.media && currentPlant.media.length > 1">
                                <template x-for="(photo, idx) in currentPlant.media" :key="idx">
                                    <img :src="photo" @click="activePhotoIndex = idx" class="w-16 h-16 object-cover rounded-lg cursor-pointer border-2" :class="activePhotoIndex === idx ? 'border-[#B48B5C]' : 'border-transparent opacity-60'">
                                </template>
                            </div>
                        </div>
                        <div class="md:w-1/2 p-8 max-h-[80vh] overflow-y-auto">
                            <span class="text-xs uppercase text-[#B48B5C] font-semibold" x-text="currentPlant.group"></span>
                            <h2 class="font-serif text-3xl font-bold text-[#1C352D] mt-1" x-text="currentPlant.title"></h2>
                            <div class="mt-4 space-y-2 text-sm">
                                <template x-for="(value, key) in currentPlant.details" :key="key">
                                    <div class="flex border-b border-gray-100 py-2">
                                        <span class="font-semibold text-[#5B7065] w-32" x-text="key + ':'"></span>
                                        <span x-text="value"></span>
                                    </div>
                                </template>
                            </div>
                            <div class="mt-6 bg-[#FAF9F5] p-4 rounded-xl">
                                <h4 class="text-xs uppercase font-bold text-[#B48B5C]">🌿 Рекомендации по уходу</h4>
                                <div class="mt-2 text-sm space-y-1">
                                    <div><span class="font-semibold">Свет:</span> <span x-text="getCare(currentPlant.group).light"></span></div>
                                    <div><span class="font-semibold">Полив:</span> <span x-text="getCare(currentPlant.group).water"></span></div>
                                </div>
                            </div>
                            <div class="mt-6 pt-6 border-t flex justify-between items-center">
                                <span class="text-3xl font-bold text-[#1C352D]" x-text="currentPlant.price + ' ₽'"></span>
                                <button @click="toggleSelection(currentPlant)" :class="isSelected(currentPlant) ? 'bg-[#B48B5C]' : 'bg-[#1C352D]'" class="text-white px-8 py-3 rounded-xl font-bold transition hover:scale-105" x-text="isSelected(currentPlant) ? 'В списке' : 'Выбрать'"></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ПОЛНЫЙ ЭКРАН -->
        <div x-show="isFullScreen" x-cloak class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center" @click.away="isFullScreen = false">
            <button @click="isFullScreen = false" class="absolute top-6 right-6 text-white text-3xl z-10">✕</button>
            <template x-for="(photo, idx) in currentPlant.media" :key="idx">
                <img :src="photo" x-show="activePhotoIndex === idx" class="max-h-[90vh] max-w-[90vw] object-contain">
            </template>
            <button x-show="currentPlant.media && currentPlant.media.length > 1" @click="prevPhoto()" class="absolute left-4 text-white text-4xl bg-black/50 px-4 py-6 rounded-xl">‹</button>
            <button x-show="currentPlant.media && currentPlant.media.length > 1" @click="nextPhoto()" class="absolute right-4 text-white text-4xl bg-black/50 px-4 py-6 rounded-xl">›</button>
        </div>

        <!-- БАР СРАВНЕНИЯ -->
        <div x-show="comparisonList.length > 0" x-cloak class="fixed bottom-28 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md rounded-2xl shadow-xl border px-6 py-3 flex items-center gap-6 z-40">
            <span class="font-bold">⚖️ Сравнение: <span x-text="comparisonList.length"></span></span>
            <button @click="comparisonOpen = true" class="bg-[#B48B5C] text-white px-4 py-2 rounded-xl text-sm font-bold">Сравнить</button>
            <button @click="comparisonList = []" class="text-xs text-gray-400 hover:text-red-500">Очистить</button>
        </div>

        <!-- МОДАЛКА СРАВНЕНИЯ -->
        <div x-show="comparisonOpen" x-cloak class="fixed inset-0 z-50 overflow-y-auto">
            <div class="flex items-center justify-center min-h-screen p-4">
                <div class="fixed inset-0 bg-black/70" @click="comparisonOpen = false"></div>
                <div class="bg-white rounded-3xl p-8 max-w-5xl w-full relative z-10 max-h-[90vh] overflow-auto">
                    <button @click="comparisonOpen = false" class="absolute top-4 right-4 text-2xl">✕</button>
                    <h3 class="font-serif text-3xl font-bold mb-6">Сравнение</h3>
                    <table class="w-full text-left">
                        <thead>
                            <tr>
                                <th class="py-3 font-bold text-gray-400 text-xs uppercase">Параметр</th>
                                <template x-for="item in comparisonList" :key="item.id">
                                    <th class="py-3 px-4 font-serif text-xl text-[#1C352D] font-bold" x-text="item.title"></th>
                                </template>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="py-3 font-bold text-gray-400 text-xs uppercase">Фото</td>
                                <template x-for="item in comparisonList" :key="item.id">
                                    <td class="py-3 px-4"><img :src="item.media[0]" class="w-24 h-24 object-cover rounded-xl"></td>
                                </template>
                            </tr>
                            <tr>
                                <td class="py-3 font-bold text-gray-400 text-xs uppercase">Группа</td>
                                <template x-for="item in comparisonList" :key="item.id">
                                    <td class="py-3 px-4 font-bold text-[#B48B5C]" x-text="item.group"></td>
                                </template>
                            </tr>
                            <tr>
                                <td class="py-3 font-bold text-gray-400 text-xs uppercase">Цена</td>
                                <template x-for="item in comparisonList" :key="item.id">
                                    <td class="py-3 px-4 font-bold text-xl" x-text="item.price + ' ₽'"></td>
                                </template>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- КОРЗИНА -->
        <div x-show="selectionList.length > 0" x-cloak class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[#1C352D] text-white rounded-full shadow-2xl px-6 py-3 flex items-center gap-6 z-40 max-w-2xl w-11/12">
            <div>
                <span class="text-xs opacity-75">Выбрано: <span x-text="selectionList.length"></span></span>
                <span class="text-lg font-bold ml-2" x-text="calculateTotal() + ' ₽'"></span>
            </div>
            <button @click="clearSelection()" class="text-xs text-white/70 hover:text-red-300 uppercase">Очистить</button>
            <button @click="copyForAvito()" class="bg-[#B48B5C] hover:bg-opacity-90 px-5 py-2 rounded-full text-xs font-bold uppercase transition">В Авито</button>
        </div>

        <!-- ТОСТ -->
        <div x-show="toastMessage" x-cloak class="toast" :class="toastMessage ? 'show' : ''" x-text="toastMessage"></div>

    </main>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('catalogApp', () => ({
            plants: [],
            groups: ['all'],
            activeGroup: 'all',
            searchQuery: '',
            onlyInStock: false,
            sortBy: 'group',
            loading: true,
            error: false,
            errorMessage: '',
            selectionList: [],
            comparisonList: [],
            modalOpen: false,
            currentPlant: { media: [], title: '', group: '', details: {} },
            activePhotoIndex: 0,
            comparisonOpen: false,
            isFullScreen: false,
            toastMessage: '',
            toastTimeout: null,

            async init() {
                // Восстанавливаем localStorage
                try {
                    const sel = JSON.parse(localStorage.getItem('fruit_selection'));
                    const comp = JSON.parse(localStorage.getItem('fruit_comparison'));
                    if (Array.isArray(sel)) this.selectionList = sel;
                    if (Array.isArray(comp)) this.comparisonList = comp;
                } catch(e) {}

                try {
                    const id = '1-0S3n227q-louVVKXTdOOGLvEONiLnBNSxdKit--sJk';
                    const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const csv = await res.text();
                    const rows = csv.split('\n').filter(r => r.trim());
                    if (rows.length < 2) throw new Error('Нет данных');
                    
                    const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
                    console.log('Заголовки:', headers);
                    
                    // Поиск индексов
                    const titleIdx = headers.findIndex(h => h.includes('название') || h.includes('сорт'));
                    const priceIdx = headers.findIndex(h => h.includes('цен'));
                    const stockIdx = headers.findIndex(h => h.includes('налич') || h.includes('количество'));
                    const groupIdx = headers.findIndex(h => h.includes('групп') || h.includes('тип') || h.includes('вид'));
                    const photoIdx = headers.findIndex(h => h.includes('фото') || h.includes('ссылка'));
                    
                    this.plants = rows.slice(1).map((row, i) => {
                        const cols = row.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                        const title = titleIdx >= 0 ? cols[titleIdx] || `Растение ${i+1}` : `Растение ${i+1}`;
                        if (!title) return null;
                        
                        // Собираем фото
                        const media = [];
                        if (photoIdx >= 0 && cols[photoIdx] && cols[photoIdx].startsWith('http')) {
                            cols[photoIdx].split(/[|,;]/).forEach(url => {
                                const u = url.trim();
                                if (u.startsWith('http')) media.push(u);
                            });
                        }
                        if (media.length === 0) media.push('https://via.placeholder.com/600?text=Нет+фото');
                        
                        // Собираем детали
                        const details = {};
                        headers.forEach((h, idx) => {
                            const val = cols[idx] || '';
                            if (val && !['название', 'сорт', 'цена', 'наличие', 'количество', 'группа', 'тип', 'вид', 'фото', 'ссылка', 'image'].some(key => h.includes(key))) {
                                details[h] = val;
                            }
                        });
                        
                        return {
                            id: i,
                            title: title,
                            price: priceIdx >= 0 ? Number(cols[priceIdx]) || 0 : 0,
                            stock: stockIdx >= 0 ? Number(cols[stockIdx]) || 0 : 0,
                            group: groupIdx >= 0 ? (cols[groupIdx] || 'другое').toLowerCase() : 'другое',
                            media: media,
                            details: details
                        };
                    }).filter(p => p !== null);
                    
                    this.groups = ['all', ...new Set(this.plants.map(p => p.group))];
                    this.loading = false;
                    console.log('✅ Загружено:', this.plants.length);
                } catch(e) {
                    console.error('❌ Ошибка:', e);
                    this.error = true;
                    this.errorMessage = e.message;
                    this.loading = false;
                }
            },

            get filteredPlants() {
                return this.plants.filter(p => {
                    const matchGroup = this.activeGroup === 'all' || p.group === this.activeGroup;
                    const matchStock = !this.onlyInStock || p.stock > 0;
                    const matchSearch = p.title.toLowerCase().includes(this.searchQuery.toLowerCase());
                    return matchGroup && matchStock && matchSearch;
                });
            },

            get sortedPlants() {
                const list = [...this.filteredPlants];
                switch(this.sortBy) {
                    case 'group': return list.sort((a,b) => a.group.localeCompare(b.group) || a.title.localeCompare(b.title));
                    case 'price-asc': return list.sort((a,b) => a.price - b.price);
                    case 'price-desc': return list.sort((a,b) => b.price - a.price);
                    case 'name-asc': return list.sort((a,b) => a.title.localeCompare(b.title));
                    case 'stock': return list.sort((a,b) => (b.stock > 0) - (a.stock > 0));
                    default: return list;
                }
            },

            toggleSelection(p) {
                const idx = this.selectionList.findIndex(item => item.id === p.id);
                if (idx > -1) {
                    this.selectionList.splice(idx, 1);
                    this.showToast(`«${p.title}» убран`);
                } else {
                    this.selectionList.push(p);
                    this.showToast(`«${p.title}» добавлен`);
                }
                localStorage.setItem('fruit_selection', JSON.stringify(this.selectionList));
            },

            isSelected(p) {
                return this.selectionList.some(item => item.id === p.id);
            },

            calculateTotal() {
                return this.selectionList.reduce((sum, p) => sum + p.price, 0);
            },

            clearSelection() {
                this.selectionList = [];
                localStorage.setItem('fruit_selection', JSON.stringify(this.selectionList));
                this.showToast('Корзина очищена');
            },

            copyForAvito() {
                let text = "Здравствуйте! Хочу приобрести:\n\n";
                this.selectionList.forEach(p => text += `• ${p.title} (${p.price} ₽)\n`);
                text += `\nИтого: ${this.calculateTotal()} ₽.`;
                navigator.clipboard.writeText(text).then(() => this.showToast('Список скопирован!'));
            },

            toggleComparison(p) {
                const idx = this.comparisonList.findIndex(item => item.id === p.id);
                if (idx > -1) {
                    this.comparisonList.splice(idx, 1);
                    this.showToast(`«${p.title}» убран из сравнения`);
                } else {
                    if (this.comparisonList.length >= 3) {
                        this.showToast('Не более 3 сортов');
                        return;
                    }
                    this.comparisonList.push(p);
                    this.showToast(`«${p.title}» добавлен к сравнению`);
                }
                localStorage.setItem('fruit_comparison', JSON.stringify(this.comparisonList));
            },

            isInComparison(p) {
                return this.comparisonList.some(item => item.id === p.id);
            },

            openModal(plant) {
                this.currentPlant = plant;
                this.activePhotoIndex = 0;
                this.modalOpen = true;
            },

            closeModal() {
                this.modalOpen = false;
            },

            openFullScreen() {
                this.isFullScreen = true;
            },

            nextPhoto() {
                if (this.activePhotoIndex < this.currentPlant.media.length - 1) this.activePhotoIndex++;
                else this.activePhotoIndex = 0;
            },

            prevPhoto() {
                if (this.activePhotoIndex > 0) this.activePhotoIndex--;
                else this.activePhotoIndex = this.currentPlant.media.length - 1;
            },

            showToast(msg) {
                if (this.toastTimeout) clearTimeout(this.toastTimeout);
                this.toastMessage = msg;
                this.toastTimeout = setTimeout(() => { this.toastMessage = ''; }, 2000);
            },

            getCare(group) {
                return { light: 'Яркий рассеянный свет', water: 'Умеренный полив' };
            }
        }));
    });
</script>

</body>
</html>
